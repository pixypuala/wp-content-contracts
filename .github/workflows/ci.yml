name: CI

# Local == CI: the same composer scripts run here as on a developer machine.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php }} — lint, standards, unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.3']
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - name: Validate composer.json
        run: composer validate --strict
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Lint PHP for syntax errors
        run: find src tests -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
      - name: Coding standards (PHPCS / WordPress)
        run: composer lint
      - name: Unit tests (PHPUnit)
        run: composer test
